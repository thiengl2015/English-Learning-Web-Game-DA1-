name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/english-learning/English-Learning-Web-Game-DA1-
            git fetch origin staging
            git reset --hard origin/staging

            cd backend
            npm install --legacy-peer-deps

            # Run database migrations
            npx sequelize-cli db:migrate --env production

            pm2 restart english-backend || pm2 start server.js --name "english-backend"
            pm2 save

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/english-learning/English-Learning-Web-Game-DA1-/FE
            npm install --legacy-peer-deps
            npm run build

            pm2 restart english-frontend || pm2 start "npx next start -p 5005" --name "english-frontend"
            pm2 save